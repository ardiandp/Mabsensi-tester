<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - M-Absensi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
      <h1>M-Absensi</h1>
      <p>Panel Administrasi</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="password" required>
      </div>
      <button type="submit" class="btn btn-primary">Masuk</button>
      <p id="loginError" class="error-msg"></p>
    </form>
  </div>
  <script>
    if (localStorage.getItem('mabsensi_admin_token')) {
      window.location.href = 'dashboard.html';
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Memproses...';
      document.getElementById('loginError').textContent = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        if (data.user.role !== 'admin') throw new Error('Akun ini bukan admin!');
        localStorage.setItem('mabsensi_admin_token', data.token);
        window.location.href = 'dashboard.html';
      } catch (err) {
        document.getElementById('loginError').textContent = err.message;
      }
      btn.disabled = false;
      btn.textContent = 'Masuk';
    });
  </script>
</body>
</html>
